name: SDK Build and Testing

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # format:
  #   name: Check Formatting and Linting
  #   runs-on: macos-26
  #   steps:
  #     - uses: actions/checkout@v6

  #     - run: brew install swiftlint

  #     - name: Run Format Check
  #       run: swift-format lint . --recursive --configuration .swift-format

  build:
    name: Build and Test (Xcode ${{ matrix.xcode }})
    runs-on: macos-${{ matrix.macos }}
    timeout-minutes: 30
    env:
      DEVELOPER_DIR: "/Applications/Xcode_${{ matrix.xcode }}.app"
    strategy:
      fail-fast: false
      matrix:
        include:
          # Check Apple Developer for information on device and Swift version support: https://developer.apple.com/support/xcode/

          # Latest
          - macos: 26
            xcode: '26.4'   # Swift 6.3
            ios-simulator: 'iPhone 17 Pro'
            ios-version: 'latest'
            sonar_check: true

          # Legacy
          - macos: 26
            xcode: '26.2'   # Swift 6.2
            ios-simulator: 'iPhone 17 Pro'
            ios-version: '26.2'

          - macos: 15
            xcode: '16.4'   # Swift 6.1
            ios-simulator: 'iPhone 16 Pro'
            ios-version: '18.6'

          - macos: 14
            xcode: '16.2'   # Swift 6.0
            ios-simulator: 'iPhone 15 Pro'
            ios-version: '17.5'

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Full history for accurate Sonar analysis

      - name: Select Xcode Version
        run: |
          ls /Applications/ | grep Xcode
          sudo xcode-select -s ${{ env.DEVELOPER_DIR }}

      - name: Prepare Simulator
        run: |
          set -o pipefail
          
          # Find the UDID for the specified simulator and iOS version
          SIMULATOR_UDID=$(
            xcrun simctl list -j devices available | \
            jq -r --arg name "${{ matrix.ios-simulator }}" --arg ver "${{ matrix.ios-version }}" \
            '.devices | to_entries[] | select($ver == "latest" or (.key | contains($ver | gsub("\\."; "-")))) | .value[] | select(.name == $name) | .udid' | head -1
          )

          xcrun simctl boot "$SIMULATOR_UDID"
          xcrun simctl list devices

          echo "SIMULATOR_UDID=$SIMULATOR_UDID" >> "$GITHUB_ENV"

      - name: Build and Test (Simulator)
        run: |
          set -o pipefail
          xcodebuild clean build test \
            CODE_SIGNING_ALLOWED=NO \
            -project NeuroID.xcodeproj \
            -scheme NeuroID \
            -destination "id=$SIMULATOR_UDID" \
            -resultBundlePath TestResults.xcresult | \
          xcbeautify --renderer github-actions

      - name: Convert Coverage for Sonar
        if: ${{ matrix.sonar_check == true }}
        run: ./Scripts/xccov-to-sonarqube-generic.sh TestResults.xcresult > Coverage.xml

      - name: Upload test results
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: xcode-test-results-macos-${{ matrix.macos }}-xcode-${{ matrix.xcode }}
          path: |
            TestResults.xcresult
            Coverage.xml 
          if-no-files-found: ignore # Coverage.xml wil not exist for older builds

      - name: Sonar Scan
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9
        if: ${{ matrix.sonar_check == true }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
