# ******************************************************************
# Please see README.md for prerequisites and repository settings.
# ******************************************************************

name: SDK Build and Testing

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and Test (Xcode ${{ matrix.xcode }})
    runs-on: macos-${{ matrix.macos }}
    timeout-minutes: 30
    env:
      DEVELOPER_DIR: "/Applications/Xcode_${{ matrix.xcode }}.app"
    strategy:
      fail-fast: false
      matrix:
        include:
          # Check Apple Developer for information on device and Swift version support: https://developer.apple.com/support/xcode/
          
          # Latest
          - macos: 26
            xcode: '26.4'   # Swift 6.3
            ios-simulator: 'iPhone 17 Pro'
            ios-version: 'latest'

          # Legacy
          - macos: 26
            xcode: '26.2'   # Swift 6.2
            ios-simulator: 'iPhone 17 Pro'
            ios-version: '26.2'

          - macos: 15
            xcode: '16.4'   # Swift 6.1
            ios-simulator: 'iPhone 16 Pro'
            ios-version: '18.6'

          - macos: 14
            xcode: '16.2'   # Swift 6.0
            ios-simulator: 'iPhone 15 Pro'
            ios-version: '17.0'

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Full history for accurate Sonar analysis

      - name: Select Xcode Version
        run: |
          ls /Applications/ | grep Xcode
          sudo xcode-select -s ${{ env.DEVELOPER_DIR }}

      - name: Prepare Simulator
        run: |
          set -o pipefail
          xcrun simctl boot "${{ matrix.ios-simulator }}" || true
          xcrun simctl list devices

      - name: Build and Test (Simulator)
        run: |
          set -o pipefail
          xcodebuild clean build test \
            CODE_SIGNING_ALLOWED=NO \
            -project NeuroID.xcodeproj \
            -scheme NeuroID \
            -destination "platform=iOS Simulator,name=${{ matrix.ios-simulator }},OS=${{ matrix.ios-version }}" \
            -configuration Debug \
            -resultBundlePath TestResults.xcresult | \
          xcbeautify --renderer github-actions

      - name: Upload test results
        uses: actions/upload-artifact@v5
        if: always() # Still upload results even if the build or tests fail
        with:
          name: xcode-test-results-macos-${{ matrix.macos }}-xcode-${{ matrix.xcode }}.xcresult
          path: TestResults.xcresult
          if-no-files-found: ignore

  sonar:
    name: Sonar Analysis
    needs: build
    runs-on: macos-26
    env:
      DEVELOPER_DIR: "/Applications/Xcode_26.4.app"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Full history for accurate Sonar analysis

      - name: Select Xcode Version
        run: sudo xcode-select -s ${{ env.DEVELOPER_DIR }}

      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          pattern: xcode-test-results-*
          path: test-results
          merge-multiple: false

      - name: Merge coverage reports
        run: xcrun xccov merge $(find test-results -maxdepth 2 -name "*.xcresult" -type d) --outReport MergedResults.xcresult

      - name: Convert Coverage for Sonar
        run: ./Scripts/xccov-to-sonarqube-generic.sh MergedResults.xcresult > Coverage.xml

      - name: Sonar Scan
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
